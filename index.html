<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Neon Geodesic Icosphere</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            background: radial-gradient(circle at center, #051811 0%, #000000 80%);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Hardware accelerated glow across the entire mesh */
            filter: drop-shadow(0 0 10px rgba(0, 255, 119, 0.7));
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const container = document.getElementById('canvas-container');

        // 1. Scene & Camera Setup
        const scene = new THREE.Scene();
        
        // PerspectiveCamera automatically enforces correct aspect ratios
        const camera = new THREE.PerspectiveCamera(
            45, 
            window.innerWidth / window.innerHeight, 
            0.1, 
            1000
        );
        camera.position.z = 4.5;

        // 2. WebGL Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // 3. Create Geodesic Geometry (Icosahedron with subdivision level 2)
        const radius = 1.2;
        const detail = 2; // Exact triangular density from your target screenshot
        const geometry = new THREE.IcosahedronGeometry(radius, detail);

        // Group to hold both wireframe edges and vertex dots
        const sphereGroup = new THREE.Group();
        scene.add(sphereGroup);

        // 4. Create Triangular Wireframe Edges (Green Glow)
        const wireframeGeometry = new THREE.WireframeGeometry(geometry);
        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x00ff77,
            transparent: true,
            opacity: 0.85,
            linewidth: 1
        });
        const wireframe = new THREE.LineSegments(wireframeGeometry, lineMaterial);
        sphereGroup.add(wireframe);

        // 5. Create Glowing Vertex Points (White Dots)
        const pointsMaterial = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 0.05,
            transparent: true,
            opacity: 0.95
        });
        const points = new THREE.Points(geometry, pointsMaterial);
        sphereGroup.add(points);

        // 6. Handle Responsive Resizing (Guarantees it stays a perfect circle on all screens)
        window.addEventListener('resize', () => {
            const width = window.innerWidth;
            const height = window.innerHeight;

            camera.aspect = width / height;
            camera.updateProjectionMatrix();

            renderer.setSize(width, height);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        });

        // 7. Animation Loop (Smooth 60FPS Rotation)
        function animate() {
            requestAnimationFrame(animate);

            // Rotate around Y and X axis for 3D depth
            sphereGroup.rotation.y += 0.003;
            sphereGroup.rotation.x = 0.2; 

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
