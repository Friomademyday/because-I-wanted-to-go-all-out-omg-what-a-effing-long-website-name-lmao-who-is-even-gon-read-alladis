<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Machine Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #intro-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 1;
            transition: opacity 1.5s ease-in-out, visibility 1.5s ease-in-out;
        }

        .stage {
            width: 300px;
            height: 400px;
            position: relative;
        }

        .robot-hand {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: bottom center;
            animation: waveRobot 1.2s ease-in-out 3;
        }

        .palm {
            width: 80px;
            height: 90px;
            background: linear-gradient(145deg, #2a2a2a, #151515);
            border: 2px solid #3a3a3a;
            border-radius: 10px 10px 25px 25px;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.1);
        }

        .palm-glow {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 30px;
            height: 30px;
            background: #00ffc8;
            border-radius: 50%;
            box-shadow: 0 0 15px #00ffc8, 0 0 30px #00ffc8;
            animation: pulseGlow 1.5s infinite alternate;
        }

        .finger {
            position: absolute;
            width: 16px;
            background: linear-gradient(to bottom, #333, #111);
            border: 1px solid #444;
            border-radius: 8px;
            transform-origin: bottom center;
        }

        .f-segment {
            width: 100%;
            height: 33%;
            border-bottom: 2px solid #00ffc8;
        }

        .finger-1 {
            height: 75px;
            top: -70px;
            left: 2px;
            animation: fingerFlex 0.6s ease-in-out infinite alternate;
        }

        .finger-2 {
            height: 85px;
            top: -80px;
            left: 22px;
            animation: fingerFlex 0.6s ease-in-out infinite alternate 0.1s;
        }

        .finger-3 {
            height: 80px;
            top: -75px;
            left: 42px;
            animation: fingerFlex 0.6s ease-in-out infinite alternate 0.2s;
        }

        .finger-4 {
            height: 65px;
            top: -60px;
            left: 62px;
            animation: fingerFlex 0.6s ease-in-out infinite alternate 0.3s;
        }

        .thumb {
            position: absolute;
            width: 16px;
            height: 55px;
            background: linear-gradient(to right, #333, #111);
            border: 1px solid #444;
            border-radius: 8px;
            top: 30px;
            left: -14px;
            transform-origin: right bottom;
            transform: rotate(-35deg);
            animation: thumbFlex 0.6s ease-in-out infinite alternate;
        }

        .wrist {
            width: 44px;
            height: 60px;
            background: #1a1a1a;
            border-left: 4px solid #333;
            border-right: 4px solid #333;
            position: absolute;
            bottom: -58px;
            left: 18px;
        }

        .wrist-joint {
            width: 52px;
            height: 16px;
            background: #00ffc8;
            border-radius: 8px;
            position: absolute;
            bottom: -2px;
            left: -4px;
            box-shadow: 0 0 10px #00ffc8;
        }

        #main-content {
            opacity: 0;
            text-align: center;
            transition: opacity 2s ease-in-out;
            padding: 40px;
        }

        h1 {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #444444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.2rem;
            color: #888888;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        @keyframes waveRobot {
            0% { transform: translateX(-50%) rotate(0deg); }
            25% { transform: translateX(-50%) rotate(-15deg); }
            75% { transform: translateX(-50%) rotate(15deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        @keyframes fingerFlex {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(0.85); }
        }

        @keyframes thumbFlex {
            0% { transform: rotate(-35deg) scaleY(1); }
            100% { transform: rotate(-25deg) scaleY(0.9); }
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); opacity: 0.6; }
            100% { transform: scale(1.2); opacity: 1; }
        }

        .fade-out {
            opacity: 0 !important;
            visibility: hidden;
        }

        .fade-in {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <div class="stage">
            <div class="robot-hand">
                <div class="finger finger-1"><div class="f-segment"></div><div class="f-segment"></div></div>
                <div class="finger finger-2"><div class="f-segment"></div><div class="f-segment"></div></div>
                <div class="finger finger-3"><div class="f-segment"></div><div class="f-segment"></div></div>
                <div class="finger finger-4"><div class="f-segment"></div><div class="f-segment"></div></div>
                <div class="thumb"><div class="f-segment"></div></div>
                <div class="palm">
                    <div class="palm-glow"></div>
                </div>
                <div class="wrist">
                    <div class="wrist-joint"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="main-content">
        <h1>hey there welcome</h1>
        <p>System Online</p>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const overlay = document.getElementById('intro-overlay');
                const content = document.getElementById('main-content');
                
                overlay.classList.add('fade-out');
                content.classList.add('fade-in');
            }, 3800);
        });
    </script>
</body>
      </html>
