<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Quantum Orb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #020208;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .ui-layer {
            position: relative;
            z-index: 2;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            color: #ffffff;
            text-transform: uppercase;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        p {
            font-size: 1rem;
            color: #555577;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            p {
                font-size: 0.8rem;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="ui-layer">
        <h1>hey there welcome</h1>
        <p>Touch the Core</p>
    </div>

    <canvas id="orbCanvas"></canvas>

    <script>
        const canvas = document.getElementById('orbCanvas');
        const ctx = canvas.getContext('2d');

        let width = window.innerWidth;
        let height = window.innerHeight;
        
        let dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        ctx.scale(dpr, dpr);

        const particles = [];
        const particleCount = 1000;
        let baseRadius = Math.min(width, height) * 0.25;
        
        let mouse = {
            x: width / 2,
            y: height / 2,
            isDown: false,
            targetX: width / 2,
            targetY: height / 2
        };

        class Particle {
            constructor(angle) {
                this.angle = angle;
                this.distance = baseRadius + (Math.random() * 30 - 15);
                this.size = Math.random() * 2 + 0.5;
                
                if (Math.random() > 0.5) {
                    this.color = { r: 138, g: 43, b: 226 };
                } else {
                    this.color = { r: 0, g: 191, b: 255 };
                }
                
                this.x = width / 2 + Math.cos(this.angle) * this.distance;
                this.y = height / 2 + Math.sin(this.angle) * this.distance;
                
                this.vibrateSpeed = 0.1 + Math.random() * 0.2;
                this.vibrateRange = 2;
                this.vibrateSeed = Math.random() * 100;
            }

            update(centerX, centerY, isInteracting) {
                this.vibrateSeed += this.vibrateSpeed;
                
                let currentRange = this.vibrateRange;
                if (isInteracting) {
                    currentRange = Math.random() * 15 + 5;
                }

                let offset = Math.sin(this.vibrateSeed) * currentRange;
                let currentDistance = this.distance + offset;

                let targetX = centerX + Math.cos(this.angle) * currentDistance;
                let targetY = centerY + Math.sin(this.angle) * currentDistance;

                this.x += (targetX - this.x) * 0.15;
                this.y += (targetY - this.y) * 0.15;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgb(${this.color.r}, ${this.color.g}, ${this.color.b})`;
                ctx.fill();
            }
        }

        function init() {
            particles.length = 0;
            baseRadius = Math.min(width, height) * 0.23;
            for (let i = 0; i < particleCount; i++) {
                let angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.1;
                particles.push(new Particle(angle));
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(2, 2, 8, 0.2)';
            ctx.fillRect(0, 0, width, height);

            mouse.x += (mouse.targetX - mouse.x) * 0.12;
            mouse.y += (mouse.targetY - mouse.y) * 0.12;

            for (let i = 0; i < particles.length; i++) {
                particles[i].update(mouse.x, mouse.y, mouse.isDown);
                particles[i].draw();
            }

            if (mouse.isDown) {
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, baseRadius * 0.8, 0, Math.PI * 2);
                let gradient = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, baseRadius * 0.8);
                gradient.addColorStop(0, 'rgba(138, 43, 226, 0.05)');
                gradient.addColorStop(0.5, 'rgba(0, 191, 255, 0.02)');
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            ctx.scale(dpr, dpr);
            baseRadius = Math.min(width, height) * 0.23;
            
            if (!mouse.isDown) {
                mouse.targetX = width / 2;
                mouse.targetY = height / 2;
            }
        });

        window.addEventListener('mousemove', (e) => {
            mouse.targetX = e.clientX;
            mouse.targetY = e.clientY;
        });

        window.addEventListener('mousedown', () => {
            mouse.isDown = true;
        });

        window.addEventListener('mouseup', () => {
            mouse.isDown = false;
            mouse.targetX = width / 2;
            mouse.targetY = height / 2;
        });

        window.addEventListener('touchstart', (e) => {
            mouse.isDown = true;
            mouse.targetX = e.touches[0].clientX;
            mouse.targetY = e.touches[0].clientY;
        });

        window.addEventListener('touchmove', (e) => {
            mouse.targetX = e.touches[0].clientX;
            mouse.targetY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => {
            mouse.isDown = false;
            mouse.targetX = width / 2;
            mouse.targetY = height / 2;
        });

        init();
        animate();
    </script>
</body>
</html>
